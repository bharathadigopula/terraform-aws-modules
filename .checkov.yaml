soft-fail: false
framework: terraform
compact: true
quiet: true
skip-check:
  - CKV_AWS_79    # IMDSv2 - false positive, optional() defaults not resolved by checkov
  - CKV_AWS_341   # hop limit - false positive, same reason as above
  - CKV_AWS_91    # ALB access logs - consumer configures via access_logs variable
  - CKV_AWS_103   # TLS 1.2 on listeners - default ssl_policy is TLS 1.3 but checkov cant see optional() defaults
  - CKV_AWS_310   # CloudFront origin failover - consumer configures origin groups
  - CKV_AWS_174   # CloudFront TLS - default is TLSv1.2_2021 but checkov cant see optional() defaults
  - CKV_AWS_374   # CloudFront geo restriction - consumer decision
  - CKV_AWS_309   # API GW route auth type - consumer sets authorization_type per route
  - CKV_AWS_120   # API GW caching - costs money, consumer enables via cache_enabled variable
  - CKV_AWS_225   # API GW method caching - same as above
  - CKV2_AWS_5    # SG attached to resource - modules create SGs, consumers attach them
  - CKV2_AWS_12   # VPC default SG - managed via manage_default_security_group variable
  - CKV2_AWS_19   # EIP attached - consumer attaches via instance_ids or network_interface_ids
  - CKV2_AWS_28   # ALB WAF - consumer attaches WAF separately
  - CKV2_AWS_29   # API GW WAF - consumer attaches WAF separately
  - CKV2_AWS_32   # CloudFront response headers - consumer attaches policy
  - CKV2_AWS_47   # CloudFront WAF Log4j - consumer configures WAF rules
  - CKV2_AWS_51   # API GW client cert - consumer decision
  - CKV_AWS_340   # Beanstalk managed updates - configured in default_settings, checkov cant parse dynamic blocks
  - CKV_AWS_312   # Beanstalk health reporting - same reason
  - CKV_AWS_136   # ECR KMS encryption - consumer chooses via encryption_type variable
  - CKV_AWS_97    # ECS Fargate EFS transit encryption - consumer configures in volumes variable
  - CKV_AWS_332   # ECS Fargate platform version - default set to LATEST
  - CKV_AWS_338   # CloudWatch log retention - default set to 365 but checkov cant see variables
  - CKV_AWS_158   # CloudWatch KMS encryption - consumer provides kms_key_id
  - CKV_AWS_162   # Aurora IAM auth - already defaults to true after our fix
  - CKV_AWS_324   # RDS cluster log capture - consumer configures via enabled_cloudwatch_logs_exports
  - CKV_AWS_129   # RDS log exports - consumer configures via enabled_cloudwatch_logs_exports
  - CKV_AWS_157   # RDS Multi-AZ - consumer decision, costs double
  - CKV_AWS_265   # Keyspaces CMK - consumer chooses encryption type per table
  - CKV_AWS_71    # Redshift logging - consumer provides logging config
  - CKV_AWS_118   # RDS enhanced monitoring - default now 60 but checkov cant resolve variables
  - CKV_AWS_139   # RDS cluster deletion protection - default now true but checkov cant resolve
  - CKV_AWS_293   # RDS instance deletion protection - same reason
  - CKV_AWS_359   # Neptune IAM auth - default now true but checkov cant resolve
  - CKV_AWS_362   # Neptune copy tags to snapshot - set in code but checkov cant see
  - CKV2_AWS_8    # RDS backup plan - consumer creates AWS Backup plan separately
  - CKV2_AWS_58   # Neptune deletion protection - default now true but checkov cant resolve variables
  - CKV_AWS_53    # S3 block public ACLs - default true via optional() but checkov cant resolve
  - CKV_AWS_54    # S3 block public policy - same reason
  - CKV_AWS_55    # S3 ignore public ACLs - same reason
  - CKV_AWS_56    # S3 restrict public buckets - same reason
  - CKV_AWS_300   # S3 abort incomplete multipart - added static rule but checkov cant see it in dynamic config
