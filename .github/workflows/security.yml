name: Security Scan

on:
  push:
    branches: [main]
    paths:
      - 'modules/**'
      - '.checkov.yaml'
  pull_request:
    branches: [main]
    paths:
      - 'modules/**'
      - '.checkov.yaml'
  workflow_dispatch:

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  detect-changes:
    name: Detect Changed Modules
    runs-on: ubuntu-latest
    outputs:
      changed_categories: ${{ steps.changes.outputs.changed_categories }}
      has_changes: ${{ steps.changes.outputs.has_changes }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Find Changed Categories
        id: changes
        run: |
          if [ "${{ github.event_name }}" = "pull_request" ]; then
            BASE=${{ github.event.pull_request.base.sha }}
          else
            BASE=${{ github.event.before }}
          fi

          if [ "$BASE" = "0000000000000000000000000000000000000000" ] || [ -z "$BASE" ]; then
            CATS=$(find modules -mindepth 1 -maxdepth 1 -type d | sort -u | jq -R -s -c 'split("\n") | map(select(length > 0))')
          else
            CATS=$(git diff --name-only "$BASE" HEAD -- 'modules/' | awk -F/ '{print $1"/"$2}' | sort -u | jq -R -s -c 'split("\n") | map(select(length > 0))')
          fi

          echo "changed_categories=$CATS" >> "$GITHUB_OUTPUT"

          if [ "$CATS" = "[]" ] || [ "$CATS" = '[""]' ]; then
            echo "has_changes=false" >> "$GITHUB_OUTPUT"
          else
            echo "has_changes=true" >> "$GITHUB_OUTPUT"
          fi

  trivy:
    name: Trivy Scan
    needs: detect-changes
    if: needs.detect-changes.outputs.has_changes == 'true'
    runs-on: ubuntu-latest

    strategy:
      matrix:
        category: ${{ fromJson(needs.detect-changes.outputs.changed_categories) }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Run Trivy on ${{ matrix.category }}
        uses: aquasecurity/trivy-action@v0.35.0
        with:
          scan-type: config
          scan-ref: ${{ matrix.category }}
          severity: CRITICAL,HIGH
          exit-code: 0
          format: table

  checkov:
    name: Checkov Scan
    needs: detect-changes
    if: needs.detect-changes.outputs.has_changes == 'true'
    runs-on: ubuntu-latest

    strategy:
      matrix:
        category: ${{ fromJson(needs.detect-changes.outputs.changed_categories) }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Run Checkov on ${{ matrix.category }}
        uses: bridgecrewio/checkov-action@v12
        with:
          directory: ${{ matrix.category }}
          framework: terraform
          quiet: true
          soft_fail: false
          config_file: .checkov.yaml
