name: Security Scan

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  trivy:
    name: Trivy
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Run Trivy IaC Scanner
        uses: aquasecurity/trivy-action@v0.35.0
        with:
          scan-type: config
          scan-ref: modules
          severity: CRITICAL,HIGH
          exit-code: 0
          format: table

  checkov:
    name: Checkov
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Run Checkov
        uses: bridgecrewio/checkov-action@v12
        with:
          directory: modules
          framework: terraform
          quiet: true
          soft_fail: false
          config_file: .checkov.yaml
